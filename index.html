<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Uber決策</title>
<style>
body {font-family: Arial; background:#111; color:#fff; text-align:center; padding:20px;}
h1{margin-bottom:20px;}
button {width:90%; padding:16px; margin:10px; font-size:18px; border-radius:12px; border:none;}
#r {margin-top:30px; font-size:30px; font-weight:bold;}
#sub {margin-top:10px; font-size:16px; color:#aaa;}
</style>
</head>
<body>

<h1>🚕 Uber決策</h1>

<button onclick="d(1)">📍 到熱點</button>
<button onclick="d(2)">⏰ 高峰開始</button>
<button onclick="d(3)">⏳ 等太久</button>
<button onclick="d(4)">⚠️ 連續短單</button>
<button onclick="d(5)">💸 單價變低</button>
<button onclick="d(6)">😵 心煩</button>

<div id="r">請按按鈕</div>
<div id="sub"></div>

<script>
function d(x){
let main="", sub="";

if(x==1){main="✅ 開APP"; sub="吃第一單";}
if(x==2){main="🔥 開APP"; sub="高機率好單";}
if(x==3){main="❌ 下線"; sub="移動位置";}
if(x==4){main="❌ 停止"; sub="離開這區";}
if(x==5){main="❌ 下線"; sub="進入低價區";}
if(x==6){main="🛑 休息"; sub="10分鐘"}

document.getElementById("r").innerText=main;
document.getElementById("sub").innerText=sub;
}
</script>

</body>
</html>
