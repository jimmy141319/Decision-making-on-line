<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Uber決策系統</title>

<style>
body {
  font-family: Arial;
  background:#111;
  color:#fff;
  text-align:center;
  padding:20px;
}
h1 {margin-bottom:10px;}
#time {margin-bottom:20px; color:#aaa;}

button {
  width:90%;
  padding:16px;
  margin:10px;
  font-size:18px;
  border-radius:12px;
  border:none;
}

#result {
  margin-top:30px;
  font-size:32px;
  font-weight:bold;
}

#sub {
  margin-top:10px;
  font-size:16px;
  color:#aaa;
}
</style>
</head>

<body>

<h1>🚕 Uber決策系統</h1>
<div id="time"></div>

<button onclick="autoDecision()">⚡ 一鍵判斷（推薦）</button>

<hr style="margin:25px 0; opacity:0.2;">

<button onclick="manual(1)">📍 到熱點</button>
<button onclick="manual(2)">⏳ 等太久</button>
<button onclick="manual(3)">⚠️ 連續短單</button>
<button onclick="manual(4)">💸 單價變低</button>
<button onclick="manual(5)">😵 心煩</button>

<div id="result">請按按鈕</div>
<div id="sub"></div>

<script>

// 顯示時間
function updateTime(){
  let now = new Date();
  let h = now.getHours();
  let m = now.getMinutes();
  document.getElementById("time").innerText =
  "現在時間：" + h + ":" + (m<10?"0"+m:m);
}
setInterval(updateTime,1000);

// 一鍵自動判斷
function autoDecision(){
  let h = new Date().getHours();
  let main="", sub="";

  if(h>=16 && h<=19){
    main="🔥 開APP";
    sub="高峰時段";
  }
  else if(h>=19 && h<=22){
    main="⚠️ 選單跑";
    sub="避免短單";
  }
  else if(h>=13 && h<16){
    main="❌ 不開";
    sub="低效時段";
  }
  else{
    main="⚠️ 視情況";
    sub="觀察再開";
  }

  show(main,sub);
}

// 手動判斷
function manual(x){
  let main="", sub="";

  if(x==1){main="✅ 開APP"; sub="吃第一單";}
  if(x==2){main="❌ 下線"; sub="移動";}
  if(x==3){main="❌ 停止"; sub="離開";}
  if(x==4){main="❌ 下線"; sub="低價區";}
  if(x==5){main="🛑 休息"; sub="10分鐘";}

  show(main,sub);
}

function show(main,sub){
  document.getElementById("result").innerText=main;
  document.getElementById("sub").innerText=sub;
}

</script>

</body>
</html>
