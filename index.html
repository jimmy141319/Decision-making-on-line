<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Uber決策系統 Pro</title>

<style>
body {font-family: Arial; background:#000; color:#fff; text-align:center; padding:20px;}
h1 {margin-bottom:10px;}
input {
  width:90%;
  padding:15px;
  font-size:18px;
  border-radius:10px;
  border:none;
}
button {
  width:90%;
  padding:16px;
  margin:10px;
  font-size:18px;
  border-radius:12px;
  border:none;
}
#result {margin-top:30px; font-size:36px; font-weight:bold;}
#reason {margin-top:10px; font-size:16px; color:#aaa;}
</style>
</head>

<body>

<h1>🚕 Uber決策 Pro</h1>

<input id="loc" placeholder="輸入地點（例：南港、信義、基金三路）">

<button onclick="startVoice()">🎤 語音輸入</button>
<button onclick="decide()">⚡ 立即判斷</button>

<div id="result">等待輸入</div>
<div id="reason"></div>

<script>

// 語音輸入
function startVoice(){
  let recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
  recognition.lang = "zh-TW";
  recognition.start();
  recognition.onresult = function(event){
    document.getElementById("loc").value = event.results[0][0].transcript;
  }
}

// 主判斷
function decide(){
  let loc = document.getElementById("loc").value;
  let h = new Date().getHours();

  let result="", reason="";

  // 基隆區
  if(loc.includes("基隆") || loc.includes("基金")){
    if(h>=13 && h<16){
      result="❌ 不要開";
      reason="低效時段，直接往台北移動";
    } else {
      result="⚠️ 移動";
      reason="基隆單少，往南港/內湖";
    }
  }

  // 南港
  else if(loc.includes("南港")){
    if(h>=16 && h<=19){
      result="🔥 開APP";
      reason="高峰期，容易有單";
    } else {
      result="⚠️ 視情況";
      reason="容易短單，觀察再跑";
    }
  }

  // 信義
  else if(loc.includes("信義")){
    if(h>=17 && h<=21){
      result="🔥 開APP";
      reason="商業區高峰";
    } else {
      result="⚠️ 避短單";
      reason="容易低價單";
    }
  }

  // 中山
  else if(loc.includes("中山")){
    result="⚠️ 可跑";
    reason="流動區，注意單價";
  }

  // 內湖
  else if(loc.includes("內湖")){
    if(h>=16 && h<=19){
      result="🔥 開APP";
      reason="下班潮";
    } else {
      result="⚠️ 視情況";
      reason="非高峰單少";
    }
  }

  // 未知
  else{
    result="⚠️ 視情況";
    reason="觀察單量再決定";
  }

  document.getElementById("result").innerText=result;
  document.getElementById("reason").innerText=reason;
}

</script>

</body>
</html>
