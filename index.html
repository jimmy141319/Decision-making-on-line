<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Driver Decision Pro</title>

<style>
body{
  margin:0;
  font-family:-apple-system;
  background:#000;
  color:#fff;
  text-align:center;
}
.container{padding:20px;}
h1{font-size:26px;margin-bottom:10px;}
.section{margin:15px 0;}
button{
  width:90%;
  margin:6px 0;
  padding:14px;
  font-size:17px;
  border-radius:10px;
  border:none;
  background:#1f2937;
  color:#fff;
}
.active{background:#2563eb;}
.run{background:#16a34a;font-size:20px;}

.result{
  margin-top:25px;
  padding:20px;
  background:#111;
  border-radius:12px;
  text-align:left;
}

.big{font-size:22px;margin-bottom:10px;}
.line{margin:8px 0;color:#ccc;}
.nav{margin-top:10px;color:#60a5fa;}
</style>
</head>

<body>

<div class="container">

<h1>🚕 即時決策 Pro</h1>

<!-- 地點 -->
<div class="section">
<div>你在哪</div>
<button onclick="setArea(this,'內湖')">內湖</button>
<button onclick="setArea(this,'南港')">南港</button>
<button onclick="setArea(this,'信義')">信義</button>
<button onclick="setArea(this,'松山')">松山</button>
<button onclick="setArea(this,'板橋')">板橋</button>
<button onclick="setArea(this,'基隆')">基隆</button>
<button onclick="setArea(this,'外木山')">外木山</button>
<button onclick="setArea(this,'三峽')">三峽</button>
</div>

<!-- 狀態 -->
<div class="section">
<div>目前狀態</div>
<button onclick="setState(this,'正常')">正常</button>
<button onclick="setState(this,'等很久')">等很久</button>
<button onclick="setState(this,'短單')">短單</button>
</div>

<button class="run" onclick="run()">⚡ 判斷</button>

<div id="result" class="result">
<div class="big">等待判斷</div>
</div>

</div>

<script>

let area="",state="";

function clear(btns){
  btns.forEach(b=>b.classList.remove('active'));
}

function setArea(btn,val){
  clear(btn.parentNode.querySelectorAll('button'));
  btn.classList.add('active');
  area=val;
}

function setState(btn,val){
  clear(btn.parentNode.querySelectorAll('button'));
  btn.classList.add('active');
  state=val;
}

function run(){

  if(!area){
    show("請選地點","","","");
    return;
  }

  let hour=new Date().getHours();
  let risk=0;

  // 區域風險
  let map={
    "內湖":40,
    "南港":20,
    "信義":10,
    "松山":20,
    "板橋":25,
    "基隆":60,
    "外木山":80,
    "三峽":75
  };

  risk+=map[area]||40;

  // 時間
  if(hour>=13 && hour<16) risk+=20;
  if(hour>=16 && hour<19) risk-=20;

  // 狀態
  if(state==="等很久") risk+=30;
  if(state==="短單") risk+=30;

  // 導航建議（重點）
  let next="";
  let route="";

  if(area==="內湖"){
    next="南港軟體園區 / 信義";
    route="👉 石潭路 → 南港經貿園區";
  }
  else if(area==="基隆"){
    next="南港";
    route="👉 62快速道路 → 南港";
  }
  else if(area==="外木山"){
    next="基隆市區 → 南港";
    route="👉 先回市區再往台北";
  }
  else if(area==="三峽"){
    next="板橋";
    route="👉 往板橋車站";
  }
  else{
    next="熱門商業區";
    route="👉 往人多的地方";
  }

  let result="",action="",reason="";

  if(risk>=70){
    result="🚨 不建議停留";
    action="👉 3分鐘沒單立即離開";
    reason="高機率浪費時間";
  }else if(risk>=40){
    result="⚠️ 風險偏高";
    action="👉 觀察3分鐘或準備移動";
    reason="單量不穩";
  }else{
    result="✅ 可以跑";
    action="👉 可繼續接單";
    reason="狀況正常";
  }

  show(result,action,reason,route,next);
}

function show(r,a,rs,route,next){
  document.getElementById("result").innerHTML=`
    <div class="big">${r}</div>
    <div class="line">${a}</div>
    <div class="line">🧠 ${rs}</div>
    <div class="nav">📍 下一站：${next}</div>
    <div class="nav">${route}</div>
  `;
}

</script>

</body>
</html>
