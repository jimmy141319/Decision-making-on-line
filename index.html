<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Uber 決策系統</title>

<style>
body {
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont;
  background:#000;
  color:#fff;
  text-align:center;
  padding:20px;
}
h1 {font-size:28px;margin-bottom:10px;}

.section {margin-top:20px;}

button {
  width:90%;
  padding:16px;
  margin:8px;
  font-size:18px;
  border-radius:12px;
  border:none;
  background:#1f2937;
  color:#fff;
}

.selected {
  background:#2563eb;
}

#result {
  margin-top:30px;
  font-size:36px;
  font-weight:bold;
}

#reason {
  margin-top:10px;
  font-size:16px;
  color:#aaa;
}
</style>

</head>
<body>

<h1>🚕 Uber 決策</h1>

<div class="section">
  <div>你在哪裡</div>
  <button onclick="setLoc('keelung',this)">基隆 / 基金三路</button>
  <button onclick="setLoc('nangang',this)">南港</button>
  <button onclick="setLoc('neihu',this)">內湖</button>
  <button onclick="setLoc('songshan',this)">松山</button>
  <button onclick="setLoc('xinyi',this)">信義</button>
  <button onclick="setLoc('zhongshan',this)">中山</button>
</div>

<div class="section">
  <div>目前狀況</div>
  <button onclick="setState('normal',this)">正常</button>
  <button onclick="setState('wait',this)">等很久</button>
  <button onclick="setState('short',this)">連續短單</button>
  <button onclick="setState('low',this)">單價變低</button>
  <button onclick="setState('tired',this)">心煩 / 累</button>
</div>

<div class="section">
  <button onclick="decide()" style="background:#16a34a;">⚡ 立即判斷</button>
</div>

<div id="result">等待選擇</div>
<div id="reason"></div>

<script>

let loc="", state="";

function clearSelect(group){
  group.forEach(btn=>btn.classList.remove("selected"));
}

function setLoc(l,el){
  loc=l;
  clearSelect(document.querySelectorAll(".section:nth-child(2) button"));
  el.classList.add("selected");
}

function setState(s,el){
  state=s;
  clearSelect(document.querySelectorAll(".section:nth-child(3) button"));
  el.classList.add("selected");
}

function decide(){
  let h = new Date().getHours();
  let result="", reason="";

  if(!loc){
    result="請選地點";
    reason="";
    show(result,reason);
    return;
  }

  if(state==="tired"){
    show("❌ 先休息","情緒不穩會做錯決策");
    return;
  }

  if(state==="wait" || state==="short" || state==="low"){
    show("❌ 離開","你已經在被系統利用");
    return;
  }

  // 時段邏輯
  if(h>=13 && h<16){
    if(loc==="keelung"){
      show("❌ 不要開","低效時段 + 住宅區");
    }else{
      show("⚠️ 先移動","時間還沒到賺錢點");
    }
    return;
  }

  if(h>=16 && h<19){
    if(loc==="keelung"){
      show("⚠️ 移動","往台北主戰區");
    }else if(loc==="neihu"||loc==="songshan"||loc==="xinyi"||loc==="zhongshan"){
      show("🔥 開APP","高峰賺錢時段");
    }else{
      show("⚠️ 視情況","位置不夠好");
    }
    return;
  }

  if(h>=19 && h<22){
    if(loc==="keelung"){
      show("🏁 收工","不要再被亂派單");
    }else{
      show("⚠️ 挑單","避免短單收尾");
    }
    return;
  }

  show("⚠️ 視情況","觀察單量再決定");
}

function show(r,rs){
  document.getElementById("result").innerText=r;
  document.getElementById("reason").innerText=rs;
}

</script>

</body>
</html>
