<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Uber決策系統 Pro</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont;
  background: #000;
  color: #fff;
  text-align: center;
}

.container {
  padding: 20px;
}

h1 {
  font-size: 26px;
  margin-bottom: 10px;
}

.section {
  margin: 20px 0;
}

button {
  width: 90%;
  margin: 8px 0;
  padding: 15px;
  font-size: 18px;
  border-radius: 12px;
  border: none;
  background: #1f2937;
  color: #fff;
}

button.active {
  background: #2563eb;
}

.result {
  margin-top: 30px;
  padding: 20px;
  background: #111;
  border-radius: 12px;
}

.big {
  font-size: 22px;
  margin-bottom: 10px;
}

.small {
  font-size: 16px;
  color: #ccc;
}
</style>
</head>

<body>

<div class="container">

<h1>🚕 Uber決策 Pro</h1>

<!-- 城市 -->
<div class="section">
<div>選城市</div>
<button onclick="setCity(this,'台北')">台北</button>
<button onclick="setCity(this,'新北')">新北</button>
<button onclick="setCity(this,'基隆')">基隆</button>
<button onclick="setCity(this,'桃園')">桃園</button>
<button onclick="setCity(this,'宜蘭')">宜蘭</button>
</div>

<!-- 區域 -->
<div class="section">
<div>選區域</div>
<button onclick="setArea(this,'市區')">市區</button>
<button onclick="setArea(this,'商業區')">商業區</button>
<button onclick="setArea(this,'住宅區')">住宅區</button>
<button onclick="setArea(this,'觀光區')">觀光區</button>
<button onclick="setArea(this,'偏遠區')">偏遠區</button>
</div>

<!-- 天氣 -->
<div class="section">
<div>天氣</div>
<button onclick="setWeather(this,'晴天')">晴天</button>
<button onclick="setWeather(this,'小雨')">小雨</button>
<button onclick="setWeather(this,'大雨')">大雨</button>
</div>

<!-- 時段 -->
<div class="section">
<div>時段</div>
<button onclick="setTime(this,'尖峰')">尖峰</button>
<button onclick="setTime(this,'一般')">一般</button>
<button onclick="setTime(this,'離峰')">離峰</button>
</div>

<!-- 按鈕 -->
<button style="background:#16a34a;font-size:20px" onclick="runDecision()">
⚡ 立即決策
</button>

<!-- 結果 -->
<div id="result" class="result">
<div class="big">等待輸入</div>
</div>

</div>

<script>

let city='',area='',weather='',time='';

function clearActive(group){
  group.forEach(btn=>btn.classList.remove('active'));
}

function setCity(btn,val){
  clearActive(btn.parentNode.querySelectorAll('button'));
  btn.classList.add('active');
  city=val;
}

function setArea(btn,val){
  clearActive(btn.parentNode.querySelectorAll('button'));
  btn.classList.add('active');
  area=val;
}

function setWeather(btn,val){
  clearActive(btn.parentNode.querySelectorAll('button'));
  btn.classList.add('active');
  weather=val;
}

function setTime(btn,val){
  clearActive(btn.parentNode.querySelectorAll('button'));
  btn.classList.add('active');
  time=val;
}

function runDecision(){

  let action = "";
  let move = "";
  let reason = "";

  // 核心邏輯（商業決策）
  if(area === "偏遠區" || area === "觀光區"){
    action = "建議移動";
    move = "往市區或商業區";
    reason = "需求不穩，空車率高";
  }

  else if(weather === "大雨"){
    action = "建議立即上線";
    move = "留在原地或市區";
    reason = "需求大幅提升";
  }

  else if(time === "尖峰"){
    action = "建議上線";
    move = "市區或商業區";
    reason = "需求高峰";
  }

  else if(time === "離峰"){
    action = "建議移動";
    move = "熱門區再開APP";
    reason = "單量偏低";
  }

  else{
    action = "可正常接單";
    move = "觀察3-5分鐘";
    reason = "市場一般";
  }

  document.getElementById("result").innerHTML = `
    <div class="big">👉 ${action}</div>
    <div class="small">📍 行動：${move}</div>
    <div class="small">🧠 原因：${reason}</div>
  `;
}

</script>

</body>
</html>
